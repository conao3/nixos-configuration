<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Org-mode as a GTD Tool</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    :root {
      /* Design tokens mirror notes/design/design-md.claude.md. */
      --color-canvas: #faf9f5;
      --color-surface-soft: #f5f0e8;
      --color-surface-card: #efe9de;
      --color-surface-dark: #181715;
      --color-surface-dark-elevated: #252320;
      --color-hairline: #e6dfd8;
      --color-ink: #141413;
      --color-body: #3d3d3a;
      --color-muted: #6c6a64;
      --color-muted-soft: #8e8b82;
      --color-on-primary: #ffffff;
      --color-on-dark: #faf9f5;
      --color-primary: #cc785c;
      --color-primary-active: #a9583e;
      --color-accent-teal: #5db8a6;
      --color-accent-amber: #e8a55a;
      --color-warning: #d4a017;
      --color-success: #5db872;
      --rounded-sm: 6px;
      --rounded-md: 8px;
      --rounded-lg: 12px;
      --rounded-pill: 9999px;
      --spacing-sm: 12px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
      --spacing-section: 96px;
      --font-display: Georgia, "Times New Roman", serif;
      --font-body: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-code: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --bg: var(--color-canvas);
      --ink: var(--color-ink);
      --muted: var(--color-muted);
      --line: var(--color-hairline);
      --panel: var(--color-surface-card);
      --accent: var(--color-primary);
      --accent-2: var(--color-accent-amber);
      --accent-3: var(--color-accent-teal);
      --accent-soft: var(--color-surface-soft);
      --shadow: 0 1px 3px rgba(20, 20, 19, 0.08);
      color-scheme: light;
      font-family: var(--font-body);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        linear-gradient(110deg, rgba(204, 120, 92, 0.08), transparent 32%),
        linear-gradient(180deg, var(--color-canvas) 0%, var(--bg) 48%, var(--color-surface-soft) 100%);
      color: var(--ink);
      line-height: 1.65;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
    }

    .hero {
      min-height: 82vh;
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(320px, 0.98fr);
      gap: 44px;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--spacing-section) 28px 42px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 0;
      margin: 0 0 16px;
    }

    .eyebrow::before {
      content: "";
      width: 10px;
      height: 10px;
      margin-right: 32px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 16px 0 0 var(--accent-2), 32px 0 0 var(--accent-3);
    }

    h1 {
      margin: 0;
      max-width: 720px;
      font-family: var(--font-display);
      font-size: 4rem;
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .lead {
      max-width: 650px;
      color: var(--muted);
      font-size: 1.1rem;
      margin: 24px 0 0;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .button {
      border: 1px solid var(--ink);
      background: var(--color-primary);
      color: var(--color-on-primary);
      padding: 12px 16px;
      border-radius: var(--rounded-md);
      cursor: pointer;
      font-weight: 800;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .button.secondary {
      background: transparent;
      color: var(--ink);
      border-color: var(--line);
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .workspace {
      background: var(--color-surface-dark);
      color: var(--color-on-dark);
      border-radius: var(--rounded-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(30, 36, 34, 0.18);
    }

    .workspace-top {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      background: var(--color-surface-dark-elevated);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--color-primary);
    }

    .dot:nth-child(2) {
      background: var(--color-accent-amber);
    }

    .dot:nth-child(3) {
      background: var(--color-success);
    }

    .buffer {
      padding: 20px;
      font-family: var(--font-code);
      font-size: 0.94rem;
      line-height: 1.6;
      min-height: 410px;
    }

    .org-line {
      opacity: 0;
      transform: translateX(-8px);
      animation: reveal 420ms ease forwards;
      white-space: pre-wrap;
    }

    .org-line:nth-child(2) { animation-delay: 90ms; }
    .org-line:nth-child(3) { animation-delay: 180ms; }
    .org-line:nth-child(4) { animation-delay: 270ms; }
    .org-line:nth-child(5) { animation-delay: 360ms; }
    .org-line:nth-child(6) { animation-delay: 450ms; }
    .org-line:nth-child(7) { animation-delay: 540ms; }
    .org-line:nth-child(8) { animation-delay: 630ms; }
    .org-line:nth-child(9) { animation-delay: 720ms; }
    .org-line:nth-child(10) { animation-delay: 810ms; }

    .todo { color: var(--color-accent-amber); font-weight: 800; }
    .next { color: var(--color-accent-teal); font-weight: 800; }
    .wait { color: var(--color-warning); font-weight: 800; }
    .done { color: var(--color-muted-soft); font-weight: 800; }
    .tag { color: var(--color-primary); }
    .date { color: var(--color-accent-teal); }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 28px 80px;
    }

    .section {
      padding: var(--spacing-section) 0;
      border-top: 1px solid var(--line);
    }

    .section-header {
      display: grid;
      grid-template-columns: minmax(0, 0.75fr) minmax(280px, 1.25fr);
      gap: 40px;
      align-items: start;
      margin-bottom: 24px;
    }

    h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 3rem;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .section-header p {
      margin: 0;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--rounded-md);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 1.08rem;
    }

    .card p {
      margin: 0;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: var(--rounded-md);
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 800;
    }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--color-on-primary);
    }

    .flow {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 16px;
      align-items: stretch;
    }

    .flow-list {
      display: grid;
      gap: 10px;
    }

    .flow-step {
      border: 1px solid var(--line);
      background: var(--color-canvas);
      border-radius: var(--rounded-md);
      padding: 12px;
      text-align: left;
      cursor: pointer;
      font-weight: 800;
      color: var(--ink);
    }

    .flow-step.active {
      background: var(--ink);
      color: var(--color-on-dark);
      border-color: var(--ink);
    }

    .demo-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--rounded-md);
      padding: 18px;
      min-height: 310px;
    }

    .demo-panel h3 {
      margin: 0 0 8px;
      font-size: 1.4rem;
    }

    .demo-panel p {
      color: var(--muted);
      margin: 0 0 16px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: var(--color-surface-dark);
      color: var(--color-on-dark);
      border-radius: var(--rounded-md);
      padding: 16px;
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .simulator {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 16px;
    }

    .inbox-form {
      display: grid;
      gap: 10px;
    }

    .inbox-form input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--rounded-md);
      padding: 11px 12px;
      background: var(--color-canvas);
      color: var(--ink);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .column {
      background: var(--color-canvas);
      border: 1px solid var(--line);
      border-radius: var(--rounded-md);
      min-height: 220px;
      padding: 12px;
    }

    .column h3 {
      margin: 0 0 12px;
      font-size: 0.98rem;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .task {
      border: 1px solid var(--line);
      background: var(--color-canvas);
      border-radius: var(--rounded-md);
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease;
    }

    .task:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .task small {
      display: block;
      color: var(--muted);
      margin-top: 4px;
    }

    .agenda-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .agenda-list {
      display: grid;
      gap: 10px;
    }

    .agenda-item {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--rounded-md);
      padding: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 64px;
      border-radius: var(--rounded-pill);
      padding: 4px 9px;
      color: var(--color-on-primary);
      background: var(--accent);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .badge.next-badge { background: var(--accent); }
    .badge.wait-badge { background: var(--accent-3); }
    .badge.todo-badge { background: var(--accent-2); }

    .two-col {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 16px;
    }

    .shortcut-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .shortcut {
      display: grid;
      grid-template-columns: 142px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--rounded-md);
      padding: 12px;
    }

    kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 4px 8px;
      border-radius: var(--rounded-sm);
      background: var(--color-surface-dark);
      color: var(--color-on-dark);
      font-family: var(--font-code);
      font-size: 0.84rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .workflow {
      display: grid;
      gap: 12px;
    }

    .workflow-row {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--rounded-md);
      padding: 14px;
    }

    .workflow-row strong {
      display: block;
      margin-bottom: 4px;
    }

    .workflow-row p,
    .shortcut p {
      color: var(--muted);
      margin: 0;
    }

    .footer {
      color: var(--muted);
      padding: 24px 0 0;
      border-top: 1px solid var(--line);
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @media (max-width: 900px) {
      .hero,
      .section-header,
      .flow,
      .simulator,
      .two-col {
        grid-template-columns: 1fr;
      }

      .hero {
        padding-top: 34px;
      }

      h1 {
        font-size: 2.6rem;
      }

      h2 {
        font-size: 2.1rem;
      }

      .grid,
      .board,
      .shortcut-grid {
        grid-template-columns: 1fr;
      }

      .agenda-item {
        grid-template-columns: 1fr;
      }

      .shortcut,
      .workflow-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useMemo, useState } = React;

    const flowSteps = [
      {
        name: "Capture",
        title: "気になることを Inbox に落とす",
        body: "GTD では頭の中の未整理な気がかりを一度すべて外部化する。Org-mode では org-capture がその入口になり、ファイルを開く前に短いテンプレートへ素早く記録できる。",
        sample: "* TODO 新しいキーボード配列を試す\n  :PROPERTIES:\n  :CREATED: 2026-05-14 Thu\n  :END:\n  まず現状の入力ミスを観察する。"
      },
      {
        name: "Clarify",
        title: "次にやる行動へ分解する",
        body: "曖昧なメモは放置されやすい。Org の見出しを TODO、NEXT、WAIT、SOMEDAY などに変換し、必要ならプロジェクト配下へ移す。",
        sample: "* PROJECT Emacs の GTD 運用を固める\n** NEXT capture template を 3 種類に絞る\n** WAIT レビュー観点を同僚に確認する"
      },
      {
        name: "Organize",
        title: "文脈、期限、参照情報を添える",
        body: "タグ、SCHEDULED、DEADLINE、プロパティ、リンクで検索可能にする。ファイル分割は最小限から始め、agenda-files に含める範囲を明確にする。",
        sample: "* NEXT 週次レビューを実施する :review:home:\n  SCHEDULED: <2026-05-16 Sat 09:00>\n  - inbox.org\n  - projects.org\n  - someday.org"
      },
      {
        name: "Reflect",
        title: "Agenda で全体を眺め直す",
        body: "org-agenda は GTD のレビュー面を担う。今日の予定、次の行動、待ち、期限切れを同じ画面に集め、判断に必要な視界を作る。",
        sample: "(setq org-agenda-custom-commands\n      '((\"g\" \"GTD\"\n         ((agenda \"\")\n          (todo \"NEXT\")\n          (todo \"WAIT\")))))"
      },
      {
        name: "Engage",
        title: "今の文脈で実行する",
        body: "一覧を眺めるだけでなく、場所、時間、エネルギーに合う NEXT を選ぶ。完了したら DONE にし、ログを残して次のレビュー材料にする。",
        sample: "* DONE capture template を 3 種類に絞る\n  CLOSED: [2026-05-14 Thu 22:15]\n  - task / idea / journal に整理した。"
      }
    ];

    const agendaItems = [
      { state: "NEXT", context: "home", text: "inbox.org を空にする", date: "Today" },
      { state: "NEXT", context: "pc", text: "org-agenda-custom-commands を調整する", date: "Today" },
      { state: "WAIT", context: "work", text: "レビュー依頼の返答を待つ", date: "Fri" },
      { state: "TODO", context: "errand", text: "ノート用紙を補充する", date: "Sat" },
      { state: "NEXT", context: "review", text: "週次レビューで someday を 5 件削る", date: "Sun" }
    ];

    const shortcuts = [
      { key: "C-c c", title: "Capture を開く", body: "org-capture を呼び出す。まず Inbox に入れる入口として使う。global-set-key で割り当てるのが一般的。" },
      { key: "C-c C-c", title: "Capture を確定", body: "capture buffer の内容を保存して元の作業へ戻る。途中でやめる場合は C-c C-k。" },
      { key: "C-c a", title: "Agenda を開く", body: "org-agenda を呼び出す。カスタムコマンド g を用意しておくと GTD ビューを 2 打鍵で開ける。" },
      { key: "S-LEFT / S-RIGHT", title: "TODO 状態を変更", body: "見出し上で TODO、NEXT、WAIT、DONE を前後に切り替える。環境によっては C-c C-t が安定。" },
      { key: "C-c C-s", title: "SCHEDULED を入れる", body: "次に見る日、着手予定日を入れる。日付プロンプトでは +1d、fri、2026-05-14 のように入力できる。" },
      { key: "C-c C-d", title: "DEADLINE を入れる", body: "締切を入れる。NEXT の選択とは別に、期限として agenda に出す。" },
      { key: "C-c C-t", title: "状態を選択", body: "TODO keyword をメニューから変更する。WAIT へ送る、DONE にする操作の基準キー。" },
      { key: "C-c C-x C-a", title: "Archive する", body: "完了済みや古い見出しを archive へ移す。agenda を軽く保つため週次レビューで使う。" }
    ];

    const dailyWorkflow = [
      { time: "随時", title: "気になった瞬間に Capture", body: "C-c c で Task テンプレートを選び、短い動詞で Inbox に入れる。分類や優先度付けはここで頑張らない。" },
      { time: "朝", title: "Agenda で今日の視界を作る", body: "C-c a g で GTD ビューを開き、今日の予定、期限、NEXT を見る。実行できない項目は Inbox 処理へ戻す。" },
      { time: "処理", title: "Inbox を NEXT / WAIT / SOMEDAY に分ける", body: "見出し上で C-c C-t、C-c C-s、C-c C-d を使う。曖昧な TODO は物理的な次の行動に書き換える。" },
      { time: "実行", title: "Agenda から NEXT を選ぶ", body: "場所、時間、集中力に合う NEXT を選び、終わったら C-c C-t で DONE。続きがあれば次の NEXT を同じプロジェクトに作る。" },
      { time: "週次", title: "信頼できる一覧に戻す", body: "Inbox を空にし、WAIT の待ち先を確認し、古い DONE を C-c C-x C-a で archive。Someday は残す理由があるものだけにする。" }
    ];

    function WorkspacePreview() {
      return React.createElement("div", { className: "workspace", "aria-label": "Org-mode buffer preview" },
        React.createElement("div", { className: "workspace-top" },
          React.createElement("span", { className: "dot" }),
          React.createElement("span", { className: "dot" }),
          React.createElement("span", { className: "dot" })
        ),
        React.createElement("div", { className: "buffer" },
          React.createElement("div", { className: "org-line" }, "* GTD dashboard"),
          React.createElement("div", { className: "org-line" }, "** ", React.createElement("span", { className: "todo" }, "TODO"), " Inbox を処理する ", React.createElement("span", { className: "tag" }, ":review:")),
          React.createElement("div", { className: "org-line" }, "** ", React.createElement("span", { className: "next" }, "NEXT"), " org-capture template を整理する ", React.createElement("span", { className: "tag" }, ":emacs:")),
          React.createElement("div", { className: "org-line" }, "   ", React.createElement("span", { className: "date" }, "SCHEDULED: <2026-05-14 Thu>")),
          React.createElement("div", { className: "org-line" }, "** ", React.createElement("span", { className: "wait" }, "WAIT"), " 参考資料の確認を待つ ", React.createElement("span", { className: "tag" }, ":work:")),
          React.createElement("div", { className: "org-line" }, "** ", React.createElement("span", { className: "done" }, "DONE"), " 週次レビューのチェック項目を書く"),
          React.createElement("br"),
          React.createElement("div", { className: "org-line" }, "- capture: 迷わず入れる"),
          React.createElement("div", { className: "org-line" }, "- agenda: 選ぶために見る"),
          React.createElement("div", { className: "org-line" }, "- archive: 完了を軽くする")
        )
      );
    }

    function FlowExplorer() {
      const [active, setActive] = useState(0);
      const step = flowSteps[active];
      return React.createElement("div", { className: "flow" },
        React.createElement("div", { className: "flow-list" },
          flowSteps.map((item, index) =>
            React.createElement("button", {
              key: item.name,
              className: "flow-step" + (index === active ? " active" : ""),
              onClick: () => setActive(index)
            }, `${index + 1}. ${item.name}`)
          )
        ),
        React.createElement("div", { className: "demo-panel" },
          React.createElement("h3", null, step.title),
          React.createElement("p", null, step.body),
          React.createElement("pre", null, step.sample)

    function CaptureSimulator() {
      const [text, setText] = useState("");
      const [tasks, setTasks] = useState([
        { id: 1, state: "Inbox", title: "読んだ記事を要約する", note: "未整理の気がかり" },
        { id: 2, state: "Next", title: "agenda view を g キーに割り当てる", note: "実行可能な次の行動" },
        { id: 3, state: "Waiting", title: "会議日程の返答を待つ", note: "自分以外がボールを持つ" }
      ]);

      const addTask = () => {
        const title = text.trim();
        if (!title) return;
        setTasks([{ id: Date.now(), state: "Inbox", title, note: "capture 直後" }, ...tasks]);
        setText("");
      };

      const cycle = (task) => {
        const nextState = task.state === "Inbox" ? "Next" : task.state === "Next" ? "Waiting" : "Done";
        setTasks(tasks.map((item) => item.id === task.id ? { ...item, state: nextState, note: nextState === "Done" ? "完了ログへ" : item.note } : item));
      };

      const columns = ["Inbox", "Next", "Waiting"];
      return React.createElement("div", { className: "simulator" },
        React.createElement("div", { className: "card" },
          React.createElement("h3", null, "Capture を試す"),
          React.createElement("p", null, "入力した内容は Inbox に入り、クリックするたびに Next、Waiting、Done へ流れます。"),
          React.createElement("div", { className: "inbox-form" },
            React.createElement("input", {
              value: text,
              onChange: (event) => setText(event.target.value),
              onKeyDown: (event) => { if (event.key === "Enter") addTask(); },
              placeholder: "例: 週次レビューの観点を見直す"
            }),
            React.createElement("button", { className: "button", onClick: addTask }, "Inbox に追加")
          )
        ),
        React.createElement("div", { className: "board" },
          columns.map((column) =>
            React.createElement("div", { className: "column", key: column },
              React.createElement("h3", null,
                React.createElement("span", null, column),
                React.createElement("span", null, tasks.filter((task) => task.state === column).length)
              ),
              tasks.filter((task) => task.state === column).map((task) =>
                React.createElement("div", { className: "task", key: task.id, onClick: () => cycle(task) },
                  React.createElement("strong", null, task.title),
                  React.createElement("small", null, task.note)
                )
              )
            )
          )
        )
      );
    }

          React.createElement("section", { className: "section" },

            ),

              React.createElement("p", null, "GTD 運用では、分類よりも入口とレビューの摩擦を下げることが効く。C-c c と C-c a を起点にし、状態変更、予定日、締切、archive を同じ流れで使う。")
            ),
            React.createElement(ShortcutGuide)
          ),
          React.createElement("section", { className: "section" },
            React.createElement("div", { className: "section-header" },
              React.createElement("h2", null, "日常ワークフロー"),
              React.createElement("p", null, "キー操作は単体で覚えるより、いつ押すかを決めるほうが定着する。Capture、Agenda、Inbox 処理、実行、週次レビューを固定の流れにする。")
