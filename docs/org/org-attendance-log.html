<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Org-mode Attendance Log</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    :root {
      /* Design tokens mirror notes/design/design-md.claude.md. */
      --color-canvas: #faf9f5;
      --color-surface-soft: #f5f0e8;
      --color-surface-card: #efe9de;
      --color-surface-dark: #181715;
      --color-surface-dark-elevated: #252320;
      --color-hairline: #e6dfd8;
      --color-ink: #141413;
      --color-body: #3d3d3a;
      --color-muted: #6c6a64;
      --color-muted-soft: #8e8b82;
      --color-on-primary: #ffffff;
      --color-on-dark: #faf9f5;
      --color-on-dark-soft: #a09d96;
      --color-primary: #cc785c;
      --color-primary-active: #a9583e;
      --color-accent-teal: #5db8a6;
      --color-accent-amber: #e8a55a;
      --color-success: #5db872;
      --color-error: #c64545;
      --rounded-sm: 6px;
      --rounded-md: 8px;
      --rounded-lg: 12px;
      --rounded-pill: 9999px;
      --spacing-sm: 12px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
      --spacing-section: 96px;
      --font-display: Georgia, "Times New Roman", serif;
      --font-body: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-code: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --bg: var(--color-canvas);
      --ink: var(--color-ink);
      --muted: var(--color-muted);
      --line: var(--color-hairline);
      --panel: var(--color-surface-card);
      --work: var(--color-primary);
      --break: var(--color-accent-amber);
      --admin: var(--color-accent-teal);
      --warn: var(--color-error);
      --soft: var(--color-surface-soft);
      --shadow: 0 1px 3px rgba(20, 20, 19, 0.08);
      color-scheme: light;
      font-family: var(--font-body);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        linear-gradient(120deg, rgba(204, 120, 92, 0.08), transparent 34%),
        linear-gradient(180deg, var(--color-canvas) 0%, var(--bg) 52%, var(--color-surface-soft) 100%);
      color: var(--ink);
      line-height: 1.65;
    }

    button,
    input,
    select { font: inherit; }

    .hero {
      min-height: 82vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(330px, 0.94fr);
      gap: 44px;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--spacing-section) 28px 42px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 16px;
      color: var(--work);
      font-weight: 900;
      letter-spacing: 0;
    }

    .eyebrow::before {
      content: "";
      width: 10px;
      height: 10px;
      margin-right: 32px;
      border-radius: 50%;
      background: var(--work);
      box-shadow: 16px 0 0 var(--break), 32px 0 0 var(--admin);
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-family: var(--font-display);
      font-size: 4rem;
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: 0;
    }

    h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 3rem;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: 0;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 1.08rem;
    }

    p { margin: 0; }

    .lead {
      max-width: 680px;
      color: var(--muted);
      font-size: 1.1rem;
      margin-top: 24px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .button {
      border: 1px solid var(--color-primary);
      background: var(--color-primary);
      color: var(--color-on-primary);
      border-radius: var(--rounded-md);
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 850;
      transition: transform 150ms ease, box-shadow 150ms ease;
    }

    .button.secondary {
      background: transparent;
      color: var(--ink);
      border-color: var(--line);
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .timesheet {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--rounded-md);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .sheet-head {
      display: grid;
      grid-template-columns: 0.8fr 0.8fr 0.8fr 1fr;
      border-bottom: 1px solid var(--line);
      background: var(--color-surface-soft);
    }

    .sheet-head div,
    .sheet-row div {
      padding: 12px;
      min-width: 0;
    }

    .sheet-head div {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 900;
    }

    .sheet-row {
      display: grid;
      grid-template-columns: 0.8fr 0.8fr 0.8fr 1fr;
      border-bottom: 1px solid var(--line);
      align-items: center;
    }

    .sheet-row:last-child { border-bottom: 0; }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      padding: 4px 9px;
      border-radius: var(--rounded-pill);
      color: var(--color-on-primary);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .pill.work { background: var(--work); }
    .pill.break { background: var(--break); }
    .pill.admin { background: var(--admin); }

    .total-band {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding: 14px;
      background: var(--color-surface-dark);
      color: var(--color-on-dark);
    }

    .total-band strong {
      display: block;
      font-size: 1.55rem;
      line-height: 1.1;
    }

    .total-band span {
      color: var(--color-on-dark-soft);
      font-size: 0.84rem;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 28px 80px;
    }

    .section {
      padding: var(--spacing-section) 0;
      border-top: 1px solid var(--line);
    }

    .section-header {
      display: grid;
      grid-template-columns: minmax(0, 0.75fr) minmax(280px, 1.25fr);
      gap: 40px;
      align-items: start;
      margin-bottom: 24px;
    }

    .section-header p,
    .card p,
    .note {
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--rounded-md);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .flow {
      display: grid;
      grid-template-columns: 270px minmax(0, 1fr);
      gap: 16px;
    }

    .steps {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .step {
      border: 1px solid var(--line);
      background: var(--color-canvas);
      border-radius: var(--rounded-md);
      padding: 12px;
      text-align: left;
      cursor: pointer;
      color: var(--ink);
      font-weight: 850;
    }

    .step.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--color-on-dark);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--rounded-md);
      padding: 18px;
      min-height: 310px;
    }

    pre {
      margin: 16px 0 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: var(--color-surface-dark);
      color: var(--color-on-dark);
      border-radius: var(--rounded-md);
      padding: 16px;
      font-family: var(--font-code);
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .logger {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      gap: 16px;
    }

    .form {
      display: grid;
      gap: 10px;
    }

    .form input,
    .form select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--rounded-md);
      padding: 11px 12px;
      background: var(--color-canvas);
      color: var(--ink);
    }

    .log-list {
      display: grid;
      gap: 10px;
    }

    .log-row {
      display: grid;
      grid-template-columns: 100px 110px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--rounded-md);
      padding: 12px;
    }

    .log-row button {
      border: 1px solid var(--line);
      background: var(--color-canvas);
      border-radius: var(--rounded-md);
      padding: 8px 10px;
      cursor: pointer;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--rounded-md);
      padding: 14px;
    }

    .metric strong {
      display: block;
      font-size: 1.55rem;
      line-height: 1.1;
    }

    .metric span {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 800;
    }

    .two-col {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 16px;
    }

    .shortcut-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .shortcut {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--rounded-md);
      padding: 12px;
    }

    kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 4px 8px;
      border-radius: var(--rounded-sm);
      background: var(--color-surface-dark);
      color: var(--color-on-dark);
      font-family: var(--font-code);
      font-size: 0.84rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .workflow {
      display: grid;
      gap: 12px;
    }

    .workflow-row {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--rounded-md);
      padding: 14px;
    }

    .workflow-row strong {
      display: block;
      margin-bottom: 4px;
    }

    .workflow-row p,
    .shortcut p {
      color: var(--muted);
      margin: 0;
    }

    .footer {
      color: var(--muted);
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }

    @media (max-width: 900px) {
      .hero,
      .section-header,
      .flow,
      .logger,
      .two-col {
        grid-template-columns: 1fr;
      }

      .hero { padding-top: 34px; }

      h1 {
        font-size: 2.6rem;
      }

      h2 {
        font-size: 2.1rem;
      }

      .grid,
      .summary,
      .total-band,
      .shortcut-grid {
        grid-template-columns: 1fr;
      }

      .sheet-head div,
      .sheet-row div {
        padding: 10px 8px;
        font-size: 0.88rem;
      }

      .log-row {
        grid-template-columns: 1fr;
      }

      .shortcut,
      .workflow-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useMemo, useState } = React;

    const guideSteps = [
      {
        name: "出勤",
        title: "勤務日の最初に CLOCK を開始する",
        body: "勤怠ログでは、タスクの完了よりも時刻の証跡が主役になる。出勤時刻、休憩開始、休憩終了、退勤時刻を、あとから説明できる粒度で残す。",
        sample: "* 2026-05-14 Thu\n** WORK 勤務\n   CLOCK: [2026-05-14 Thu 09:30]--[2026-05-14 Thu 12:00]"
      },
      {
        name: "休憩",
        title: "休憩は勤務とは別の見出しにする",
        body: "休憩を勤務時間から差し引く必要があるなら、同じ WORK 見出しに混ぜない。BREAK 見出しとして記録すると、集計時に扱いやすい。",
        sample: "** BREAK 昼休憩\n   CLOCK: [2026-05-14 Thu 12:00]--[2026-05-14 Thu 13:00]"
      },
      {
        name: "作業区分",
        title: "勤怠と工数を混ぜすぎない",
        body: "勤怠は法的・契約的な勤務実績、工数はプロジェクト別の作業配分。Org では同じ clock を使えるが、見出しやタグで目的を分ける。",
        sample: "** WORK 実装 :project-a:\n   CLOCK: [2026-05-14 Thu 13:00]--[2026-05-14 Thu 16:30]\n** ADMIN 日報 :admin:\n   CLOCK: [2026-05-14 Thu 16:30]--[2026-05-14 Thu 17:00]"
      },
      {
        name: "集計",
        title: "clocktable で日次・週次を出す",
        body: "Org の clocktable は、期間、タグ、ファイル単位で clock を集計できる。提出用には Org から表を生成し、必要なら CSV に寄せる。",
        sample: "#+BEGIN: clocktable :scope file :block today :maxlevel 2\n#+END:\n\n#+BEGIN: clocktable :scope agenda :block thisweek :tags \"work\"\n#+END:"
      },
      {
        name: "補正",
        title: "修正理由をログに残す",
        body: "打刻忘れを修正する場合は、時刻だけ直すよりも理由を短く添える。勤怠は後日の説明可能性が重要になる。",
        sample: "** WORK 勤務\n   CLOCK: [2026-05-14 Thu 09:35]--[2026-05-14 Thu 12:00]\n   - 09:30 出勤、打刻忘れのため 09:35 に補正。"
      }
    ];

    const initialLogs = [
      { id: 1, type: "WORK", start: "09:30", end: "12:00", title: "午前勤務" },
      { id: 2, type: "BREAK", start: "12:00", end: "13:00", title: "昼休憩" },
      { id: 3, type: "WORK", start: "13:00", end: "16:30", title: "実装" },
      { id: 4, type: "ADMIN", start: "16:30", end: "17:00", title: "日報" }
    ];

    const attendanceShortcuts = [
      { key: "C-x C-f", title: "attendance.org を開く", body: "~/org/attendance.org を開く。出勤時に最初に触るファイルとして固定する。" },
      { key: "M->", title: "ファイル末尾へ移動", body: "今日の見出しを末尾に追加する場合に使う。既存の日付がある場合は検索で移動してもよい。" },
      { key: "M-RET", title: "同じ階層の見出しを作る", body: "日付見出しや WORK / BREAK 見出しを追加する。階層を変える場合は M-LEFT / M-RIGHT。" },
      { key: "C-c .", title: "日付を挿入", body: "日付プロンプトから今日の日付を入れる。見出し名に使う場合は * の後ろで押す。" },
      { key: "C-c C-q", title: "タグを編集", body: "現在の見出しに company_a:work のようなタグを付ける。TAB で補完、RET で確定。" },
      { key: "C-c C-x C-i", title: "Clock in", body: "現在の見出しで作業開始。出勤、休憩終了、作業再開のタイミングで使う。" },
      { key: "C-c C-x C-o", title: "Clock out", body: "現在の clock を終了。休憩開始、退勤、作業区切りで使う。" },
      { key: "C-c C-x C-j", title: "Clock 先へ移動", body: "現在 clock 中の見出しへジャンプする。別バッファで作業していて打刻状態を確認したいときに使う。" },
      { key: "C-c C-x C-r", title: "Clock report", body: "clocktable を挿入する。日次、週次、月次の合計を出す入口になる。" },
      { key: "C-c C-c", title: "表を更新", body: "clocktable ブロック上で実行すると集計を再計算する。提出前の確認で使う。" },
      { key: "C-c C-s", title: "日付を入れる", body: "勤務日見出しや予定日を整える。日付プロンプトでは today、+1d、2026-05-14 などが使える。" },
      { key: "C-c C-t", title: "区分を変える", body: "WORK、BREAK、ADMIN などを TODO keyword として使う場合の切替キー。" },
      { key: "C-c C-x C-d", title: "Clock 表示", body: "現在の clock の経過時間を表示する。休憩前や退勤前の確認に向く。" }
    ];

    const attendanceWorkflow = [
      { time: "準備", title: "attendance.org に今日の日付見出しを作る", body: "C-x C-f でファイルを開き、M-> で末尾へ移動。M-RET または手入力で * 2026-05-14 Thu を作る。日付入力は C-c . を使う。" },
      { time: "出勤", title: "会社タグ付き WORK で clock in", body: "** WORK 勤務 を作り、C-c C-q で company_a:work を付ける。その見出し上で C-c C-x C-i。複数社勤務では会社タグを必ず付ける。" },
      { time: "休憩", title: "WORK を clock out して BREAK を clock in", body: "休憩開始時に C-c C-x C-o。BREAK 昼休憩の見出しへ移動し、C-c C-q で company_a:break を付けて C-c C-x C-i。" },
      { time: "再開", title: "BREAK を閉じて WORK / ADMIN に戻る", body: "休憩終了時に C-c C-x C-o。午後の作業見出しで C-c C-x C-i。日報や会議は company_a:admin のように分ける。" },
      { time: "退勤", title: "最後の clock を閉じて補正メモを確認", body: "退勤時に C-c C-x C-o。打刻忘れや実時刻との差があれば NOTE 補正に短く理由を書く。" },
      { time: "日次", title: "clocktable を更新して会社別に見る", body: "clocktable 上で C-c C-c。company_a と company_b の集計、BREAK の扱い、未終了 clock がないことを確認する。" },
      { time: "月末", title: "会社ごとの提出用集計を作る", body: "月次 clocktable を C-c C-x C-r で作り、:tags \"company_a\" のように会社別ブロックを分ける。必要なら Org の表を export する。" }
    ];

    function minutesBetween(start, end) {
      const [sh, sm] = start.split(":").map(Number);
      const [eh, em] = end.split(":").map(Number);
      return Math.max(0, (eh * 60 + em) - (sh * 60 + sm));
    }

    function formatMinutes(minutes) {
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      return `${h}:${String(m).padStart(2, "0")}`;
    }

    function HeroSheet() {
      return React.createElement("div", { className: "timesheet", "aria-label": "Attendance log preview" },
        React.createElement("div", { className: "sheet-head" },
          React.createElement("div", null, "区分"),
          React.createElement("div", null, "開始"),
          React.createElement("div", null, "終了"),
          React.createElement("div", null, "内容")
        ),
        initialLogs.map((log) =>
          React.createElement("div", { className: "sheet-row", key: log.id },
            React.createElement("div", null, React.createElement("span", { className: `pill ${log.type.toLowerCase()}` }, log.type)),
            React.createElement("div", null, log.start),
            React.createElement("div", null, log.end),
            React.createElement("div", null, log.title)
          )
        ),
        React.createElement("div", { className: "total-band" },
          React.createElement("div", null, React.createElement("strong", null, "6:00"), React.createElement("span", null, "勤務")),
          React.createElement("div", null, React.createElement("strong", null, "1:00"), React.createElement("span", null, "休憩")),
          React.createElement("div", null, React.createElement("strong", null, "0:30"), React.createElement("span", null, "管理作業"))
        )
      );
    }

    function FlowGuide() {
      const [active, setActive] = useState(0);
      const step = guideSteps[active];
      return React.createElement("div", { className: "flow" },
        React.createElement("div", { className: "steps" },
          guideSteps.map((item, index) =>
            React.createElement("button", {
              key: item.name,
              className: "step" + (active === index ? " active" : ""),
              onClick: () => setActive(index)
            }, `${index + 1}. ${item.name}`)
          )
        ),
        React.createElement("div", { className: "panel" },
          React.createElement("h3", null, step.title),
          React.createElement("p", { className: "note" }, step.body),
          React.createElement("pre", null, step.sample)
        )
      );
    }

    function LogSimulator() {
      const [logs, setLogs] = useState(initialLogs);
      const [type, setType] = useState("WORK");
      const [start, setStart] = useState("17:00");
      const [end, setEnd] = useState("18:00");
      const [title, setTitle] = useState("レビュー");

      const add = () => {
        if (!start || !end || !title.trim()) return;
        setLogs([{ id: Date.now(), type, start, end, title: title.trim() }, ...logs]);
      };

      const remove = (id) => setLogs(logs.filter((log) => log.id !== id));

      const totals = useMemo(() => {
